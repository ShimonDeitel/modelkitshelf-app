name: Model Kit Shelf
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Model Kit Shelf:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Model Kit Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelkitshelf
        INFOPLIST_FILE: Model Kit Shelf/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Model Kit Shelf/Info.plist
      properties:
        CFBundleDisplayName: Model Kit Shelf
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Model Kit ShelfTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Model Kit ShelfTests
    dependencies:
      - target: Model Kit Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelkitshelf.tests
  Model Kit ShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Model Kit ShelfUITests
    dependencies:
      - target: Model Kit Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.modelkitshelf.uitests
schemes:
  Model Kit Shelf:
    build:
      targets:
        Model Kit Shelf: all
    test:
      targets:
        - Model Kit ShelfTests
        - Model Kit ShelfUITests
    run:
      config: Debug
    archive:
      config: Release
